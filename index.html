    <link rel="icon" href="/src/assets/icons/icon.ico" type="image/x-icon" />

      rel="shortcut icon"
      href="/src/assets/icons/icon.ico"
      type="image/x-icon"
    />

    <!-- Иконки для десктопа и современных браузеров -->
    <link
      rel="icon"

      rel="icon"
